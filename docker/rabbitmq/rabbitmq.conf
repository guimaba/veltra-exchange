# Configuração principal do RabbitMQ — ver Etapa 3 para detalhes.

# Importa a topologia declarativa (vhost, usuários, exchanges, filas, bindings)
# automaticamente no startup
management.load_definitions = /etc/rabbitmq/definitions.json

# Permite o usuário admin acessar de fora do container (não só localhost)
loopback_users = none

# Heartbeat AMQP — detecta conexões mortas
heartbeat = 30

# Limite de memória — broker para de aceitar publishes acima de 60% da RAM
vm_memory_high_watermark.relative = 0.6

# Limite de disco — bloqueia publish se faltar menos de 1 GB livre
disk_free_limit.absolute = 1GB

# Logs no stdout (capturado pelo docker logs)
log.console = true
log.console.level = info
log.file = false
