# Orquestração da Veltra Exchange (simulador de exchange spot).
# Serviços Veltra: RabbitMQ + PostgreSQL + matching engine (3 réplicas) +
#   ledger + market data + gateway (REST/WS + Flutter Web).
# Serviços LEGADOS (base blockchain — Sistemas Distribuídos): node1-3 + MariaDB
#   + audit. Mantidos aqui porque o gateway é compartilhado (serve as duas UIs);
#   estão agrupados e marcados como [LEGADO] abaixo para separação visual.
# Uso: docker compose up --build
# Acesso:
#   - Aplicação Flutter Web ......... http://localhost:8080
#   - API REST do gateway ........... http://localhost:8080/api
#   - WebSocket de eventos .......... ws://localhost:8080/ws
#   - Painel RabbitMQ Management .... http://localhost:15672  (admin / admin)

# Pares negociados: cada cripto (VLT + catálogo de 32 ativos) negocia DIRETO
# contra as 3 moedas fiat de cotação USD/BRL/EUR. TODOS passam pelo matching
# engine real (CLOB determinístico). 33 bases × 3 quotes = 99 pares.
x-veltra-pairs: &veltra_pairs "VLT/USD,VLT/BRL,VLT/EUR,BTC/USD,BTC/BRL,BTC/EUR,ETH/USD,ETH/BRL,ETH/EUR,BNB/USD,BNB/BRL,BNB/EUR,SOL/USD,SOL/BRL,SOL/EUR,XRP/USD,XRP/BRL,XRP/EUR,ADA/USD,ADA/BRL,ADA/EUR,DOGE/USD,DOGE/BRL,DOGE/EUR,DOT/USD,DOT/BRL,DOT/EUR,AVAX/USD,AVAX/BRL,AVAX/EUR,POL/USD,POL/BRL,POL/EUR,LINK/USD,LINK/BRL,LINK/EUR,UNI/USD,UNI/BRL,UNI/EUR,LTC/USD,LTC/BRL,LTC/EUR,FIL/USD,FIL/BRL,FIL/EUR,ALGO/USD,ALGO/BRL,ALGO/EUR,XLM/USD,XLM/BRL,XLM/EUR,NEAR/USD,NEAR/BRL,NEAR/EUR,ICP/USD,ICP/BRL,ICP/EUR,APT/USD,APT/BRL,APT/EUR,ARB/USD,ARB/BRL,ARB/EUR,OP/USD,OP/BRL,OP/EUR,INJ/USD,INJ/BRL,INJ/EUR,SEI/USD,SEI/BRL,SEI/EUR,SUI/USD,SUI/BRL,SUI/EUR,TIA/USD,TIA/BRL,TIA/EUR,PEPE/USD,PEPE/BRL,PEPE/EUR,SHIB/USD,SHIB/BRL,SHIB/EUR,WIF/USD,WIF/BRL,WIF/EUR,JUP/USD,JUP/BRL,JUP/EUR,BONK/USD,BONK/BRL,BONK/EUR,TON/USD,TON/BRL,TON/EUR,TRX/USD,TRX/BRL,TRX/EUR"

services:
  # -------------------------------------------------------------
  # Infra: RabbitMQ
  # -------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: blockchain-rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_DEFAULT_VHOST: /blockchain
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # UI Management
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [blockchain-net]

  # -------------------------------------------------------------
  # Infra: PostgreSQL (Veltra Exchange — ledger + auth)
  # -------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: veltra-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: veltra
      POSTGRES_PASSWORD: veltra
      POSTGRES_DB: veltra
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/postgres/schema-auth.sql:/docker-entrypoint-initdb.d/schema-auth.sql:ro
      - ./docker/postgres/schema-ledger.sql:/docker-entrypoint-initdb.d/schema-ledger.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veltra -d veltra"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [blockchain-net]

  # -------------------------------------------------------------
  # Infra: MariaDB
  # -------------------------------------------------------------
  mariadb:
    image: mariadb:10.11
    container_name: blockchain-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: blockchain
      MARIADB_USER: blockchain
      MARIADB_PASSWORD: blockchain
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [blockchain-net]

  # -------------------------------------------------------------
  # Aplicação: 3 nós da blockchain
  # -------------------------------------------------------------
  node1:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: blockchain-node1
    environment:
      NODE_ID: 1
      NODE_PORT: 8001
      PEERS: "2:node2:8002,3:node3:8003"
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: root
      AMQP_URL: "amqp://node:node-pw@rabbitmq:5672/%2Fblockchain"
    depends_on:
      rabbitmq: { condition: service_healthy }
      mariadb:  { condition: service_healthy }
    networks: [blockchain-net]

  node2:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: blockchain-node2
    environment:
      NODE_ID: 2
      NODE_PORT: 8002
      PEERS: "1:node1:8001,3:node3:8003"
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: root
      AMQP_URL: "amqp://node:node-pw@rabbitmq:5672/%2Fblockchain"
    depends_on:
      rabbitmq: { condition: service_healthy }
      mariadb:  { condition: service_healthy }
    networks: [blockchain-net]

  node3:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: blockchain-node3
    environment:
      NODE_ID: 3
      NODE_PORT: 8003
      PEERS: "1:node1:8001,2:node2:8002"
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: root
      AMQP_URL: "amqp://node:node-pw@rabbitmq:5672/%2Fblockchain"
    depends_on:
      rabbitmq: { condition: service_healthy }
      mariadb:  { condition: service_healthy }
    networks: [blockchain-net]

  # -------------------------------------------------------------
  # Aplicação: Gateway HTTP/WS + serve Flutter Web estático
  # -------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: blockchain-gateway
    environment:
      GATEWAY_PORT: 8080
      AMQP_URL: "amqp://gateway:gateway-pw@rabbitmq:5672/%2Fblockchain"
      DB_DSN: "blockchain:blockchain@tcp(mariadb:3306)/blockchain?parseTime=true"
      POSTGRES_DSN: "postgres://veltra:veltra@postgres:5432/veltra?sslmode=disable"
      VELTRA_JWT_SECRET: "veltra-exchange-jwt-secret-dev"
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq: { condition: service_healthy }
      mariadb:  { condition: service_healthy }
      postgres:  { condition: service_healthy }
    networks: [blockchain-net]

  # -------------------------------------------------------------
  # Veltra Exchange: Serviço de Ledger (settlement de dupla entrada)
  # Consome trade.executed e faucet.credit, persiste no Postgres.
  # -------------------------------------------------------------
  ledger:
    build:
      context: .
      dockerfile: docker/Dockerfile.ledger
    container_name: veltra-ledger
    environment:
      AMQP_URL: "amqp://ledger:ledger-pw@rabbitmq:5672/%2Fblockchain"
      POSTGRES_DSN: "postgres://veltra:veltra@postgres:5432/veltra?sslmode=disable"
      MERKLE_INTERVAL: "60" # computa a Merkle root a cada 60s (demo; default 5min)
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres:  { condition: service_healthy }
    networks: [blockchain-net]

  # -------------------------------------------------------------
  # Veltra Exchange: Market Data (busca preços reais da CoinGecko,
  # simula VLT baseado em ATOM, publica market.update a cada 30s)
  # -------------------------------------------------------------
  marketdata:
    build:
      context: .
      dockerfile: docker/Dockerfile.marketdata
    container_name: veltra-marketdata
    environment:
      AMQP_URL: "amqp://marketdata:marketdata-pw@rabbitmq:5672/%2Fblockchain"
      # Semeia liquidez (ordens resting por par) ao subir, financiada por faucet.
      SEED_LIQUIDITY: "true"
    depends_on:
      rabbitmq: { condition: service_healthy }
    networks: [blockchain-net]

  # -------------------------------------------------------------
  # Aplicação: Serviço de Auditoria (consome todos os eventos)
  # -------------------------------------------------------------
  audit:
    build:
      context: .
      dockerfile: docker/Dockerfile.audit
    container_name: blockchain-audit
    environment:
      AMQP_URL: "amqp://audit:audit-pw@rabbitmq:5672/%2Fblockchain"
      DB_DSN: "blockchain:blockchain@tcp(mariadb:3306)/blockchain?parseTime=true"
    depends_on:
      rabbitmq: { condition: service_healthy }
      mariadb:  { condition: service_healthy }
    networks: [blockchain-net]

  # -------------------------------------------------------------
  # Veltra Exchange: cluster do Matching Engine (failover via Bully).
  # As 3 replicas elegem um lider; so o lider consome ordens. O WAL/snapshots
  # ficam em um volume COMPARTILHADO para que a promocao recupere o estado.
  # -------------------------------------------------------------
  matching1:
    build:
      context: .
      dockerfile: docker/Dockerfile.matching
    container_name: veltra-matching1
    environment:
      NODE_ID: 1
      NODE_PORT: 9101
      PEERS: "2:matching2:9102,3:matching3:9103"
      AMQP_URL: "amqp://matching:matching-pw@rabbitmq:5672/%2Fblockchain"
      PAIRS: *veltra_pairs
      WAL_DIR: /data/matching
      SNAPSHOT_EVERY: 100
    volumes:
      - matching-wal:/data/matching
    depends_on:
      rabbitmq: { condition: service_healthy }
    networks: [blockchain-net]

  matching2:
    build:
      context: .
      dockerfile: docker/Dockerfile.matching
    container_name: veltra-matching2
    environment:
      NODE_ID: 2
      NODE_PORT: 9102
      PEERS: "1:matching1:9101,3:matching3:9103"
      AMQP_URL: "amqp://matching:matching-pw@rabbitmq:5672/%2Fblockchain"
      PAIRS: *veltra_pairs
      WAL_DIR: /data/matching
      SNAPSHOT_EVERY: 100
    volumes:
      - matching-wal:/data/matching
    depends_on:
      rabbitmq: { condition: service_healthy }
    networks: [blockchain-net]

  matching3:
    build:
      context: .
      dockerfile: docker/Dockerfile.matching
    container_name: veltra-matching3
    environment:
      NODE_ID: 3
      NODE_PORT: 9103
      PEERS: "1:matching1:9101,2:matching2:9102"
      AMQP_URL: "amqp://matching:matching-pw@rabbitmq:5672/%2Fblockchain"
      PAIRS: *veltra_pairs
      WAL_DIR: /data/matching
      SNAPSHOT_EVERY: 100
    volumes:
      - matching-wal:/data/matching
    depends_on:
      rabbitmq: { condition: service_healthy }
    networks: [blockchain-net]

# -------------------------------------------------------------
# Recursos compartilhados
# -------------------------------------------------------------
volumes:
  rabbitmq-data:
  postgres-data:
  mariadb-data:
  matching-wal:

networks:
  blockchain-net:
    driver: bridge
